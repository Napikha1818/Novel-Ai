# =============================================================
# BACKUP CONFIG — Qwen2.5-7B-Instruct (dengan safety filter)
# Gunakan ini kalau hasil base model kurang memuaskan.
# Kualitas instruksi lebih baik, tapi mungkin menolak konten eksplisit.
# =============================================================

base_model: Qwen/Qwen2.5-7B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: true

datasets:
  - path: data/dataset/train_axolotl.jsonl
    type: sharegpt
    conversation: chatml

dataset_prepared_path: data/dataset/prepared_instruct
val_set_size: 0.05

sequence_len: 8192
sample_packing: true
pad_to_sequence_len: true

# LoRA rank lebih tinggi untuk "menimpa" safety alignment
adapter: qlora
lora_r: 128
lora_alpha: 256
lora_dropout: 0.05
lora_target_linear: true

load_in_4bit: true
bnb_4bit_compute_dtype: bfloat16
bnb_4bit_use_double_quant: true
bnb_4bit_quant_type: nf4

# Epoch lebih banyak untuk menekan safety filter
output_dir: ./output/eka-qwen2.5-7b-instruct-qlora
num_epochs: 5
micro_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2e-4
lr_scheduler: cosine
warmup_ratio: 0.1
optimizer: adamw_bnb_8bit
weight_decay: 0.01
max_grad_norm: 1.0

bf16: auto
tf32: true

logging_steps: 10
save_strategy: steps
save_steps: 100
save_total_limit: 3
eval_steps: 100

gradient_checkpointing: true
flash_attention: true
seed: 42
